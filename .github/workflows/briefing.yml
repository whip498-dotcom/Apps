name: EdgeHawk Daily Briefing

# Three slots fire each US trading day at the correct ET time year-round.
# GitHub Actions cron is UTC and doesn't follow DST, so each slot has TWO
# cron lines — one for EDT (UTC-4, Mar-Nov) and one for EST (UTC-5, Nov-Mar).
# The Python entrypoint auto-detects the slot from current US Eastern time
# and exits cleanly if a stale schedule fires off-window.
#
#   slot=overnight  → 04:00 ET  → 08:00 UTC (EDT) / 09:00 UTC (EST)
#   slot=premarket  → 06:30 ET  → 10:30 UTC (EDT) / 11:30 UTC (EST)
#   slot=preopen    → 09:20 ET  → 13:20 UTC (EDT) / 14:20 UTC (EST)
#
# NOTE: GitHub pauses scheduled workflows on a repo with no commit activity
# for 60 days. If the briefing stops firing, push any commit (even a no-op)
# to re-arm the schedule.

on:
  schedule:
    # overnight (04:00 ET)
    - cron: "0 8 * * 1-5"
    - cron: "0 9 * * 1-5"
    # premarket (06:30 ET)
    - cron: "30 10 * * 1-5"
    - cron: "30 11 * * 1-5"
    # preopen (09:20 ET)
    - cron: "20 13 * * 1-5"
    - cron: "20 14 * * 1-5"
  workflow_dispatch:
    inputs:
      slot:
        description: "Force a specific slot (overrides auto-detect)"
        required: false
        type: choice
        options:
          - auto
          - overnight
          - premarket
          - preopen
        default: auto

concurrency:
  group: edgehawk-briefing-${{ github.event.schedule || github.event.inputs.slot }}
  cancel-in-progress: false

jobs:
  briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: bot
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: bot/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine slot
        id: slot
        env:
          MANUAL_SLOT: ${{ github.event.inputs.slot }}
        run: |
          if [ -n "$MANUAL_SLOT" ] && [ "$MANUAL_SLOT" != "auto" ]; then
            echo "slot=$MANUAL_SLOT" >> "$GITHUB_OUTPUT"
            echo "Manual dispatch — slot=$MANUAL_SLOT"
            exit 0
          fi
          ET_HOUR=$(TZ=America/New_York date +%H)
          ET_TIME=$(TZ=America/New_York date +%H:%M)
          echo "Current ET: $ET_TIME"
          if [ "$ET_HOUR" -lt 5 ]; then
            SLOT=overnight
          elif [ "$ET_HOUR" -lt 8 ]; then
            SLOT=premarket
          elif [ "$ET_HOUR" -lt 11 ]; then
            SLOT=preopen
          else
            echo "Outside slot window — exiting cleanly."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "slot=$SLOT" >> "$GITHUB_OUTPUT"
          echo "Detected slot: $SLOT"

      - name: Run briefing
        if: steps.slot.outputs.skip != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          FINNHUB_API_KEY_2: ${{ secrets.FINNHUB_API_KEY_2 }}
          FINNHUB_API_KEY_3: ${{ secrets.FINNHUB_API_KEY_3 }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
          SCAN_PRICE_MIN: "3"
          SCAN_PRICE_MAX: "20"
          SCAN_MAX_FLOAT: "30000000"
          SCAN_MIN_GAP_PCT: "10"
          SCAN_MIN_PREMARKET_VOLUME: "50000"
          SCAN_MIN_RELATIVE_VOLUME: "2.0"
          SCAN_MIN_CONFIDENCE: "8"
        run: |
          python -m src.cli briefing --slot ${{ steps.slot.outputs.slot }} --alert --no-print

      - name: Upload briefing JSON
        if: steps.slot.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: briefing-${{ steps.slot.outputs.slot }}-${{ github.run_id }}
          path: bot/data_cache/briefing_*.json
          if-no-files-found: warn
          retention-days: 30
