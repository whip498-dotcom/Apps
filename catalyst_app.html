<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Catalyst">
<meta name="theme-color" content="#080a0e">
<title>Catalyst</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Cabinet+Grotesk:wght@700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#080a0e;color:#fff;font-family:'DM Mono',monospace;overflow-x:hidden}
input,textarea,select{font-family:'DM Mono',monospace;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);border-radius:10px;color:#fff;outline:none;width:100%}
input:focus,textarea:focus{border-color:rgba(255,255,255,0.3)}
input[type=range]{-webkit-appearance:none;appearance:none;height:4px;background:rgba(255,255,255,0.08);border-radius:99px;border:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;cursor:pointer}
button{cursor:pointer;border:none;font-family:'DM Mono',monospace;outline:none}
textarea{resize:vertical;padding:12px 14px;font-size:12px;line-height:1.7}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:#222;border-radius:3px}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}

/* Layout */
#app{display:flex;flex-direction:column;height:100vh}
#header{background:rgba(8,10,14,0.97);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,0.06);padding:52px 20px 0;flex-shrink:0;z-index:20}
#content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
#bottom-nav{background:rgba(8,10,14,0.97);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:1px solid rgba(255,255,255,0.06);display:flex;flex-shrink:0;padding-bottom:env(safe-area-inset-bottom,0px)}
.nav-item{flex:1;padding:12px 0 8px;display:flex;flex-direction:column;align-items:center;gap:4px;background:transparent;border:none;cursor:pointer;transition:opacity .15s}
.nav-item .nav-icon{font-size:20px;line-height:1}
.nav-item .nav-label{font-size:9px;letter-spacing:1px;color:#555;transition:color .15s}
.nav-item.active .nav-label{color:#22c55e}

/* Screens */
.screen{display:none;padding:20px 16px 40px;max-width:680px;margin:0 auto;animation:fadeUp .3s ease}
.screen.active{display:block}

/* Cards */
.card{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.07);border-radius:16px;padding:18px;margin-bottom:14px}
.section-title{font-size:10px;color:#555;letter-spacing:2px;margin-bottom:14px}
.label{font-size:10px;color:#888;letter-spacing:2px;display:block;margin-bottom:8px}

/* Inputs */
.input-num{padding:12px 48px 12px 16px;font-size:20px;font-weight:700;font-family:'Cabinet Grotesk',sans-serif}
.input-date{padding:10px 14px;font-size:13px;color-scheme:dark}
.input-sm{padding:8px 10px;font-size:14px;font-weight:700;font-family:'Cabinet Grotesk',sans-serif}

/* Buttons */
.btn-primary{width:100%;padding:16px;border-radius:14px;font-family:'Cabinet Grotesk',sans-serif;font-size:16px;font-weight:700;background:linear-gradient(135deg,#22c55e,#16a34a);color:#000;box-shadow:0 4px 20px rgba(34,197,94,.3);transition:opacity .2s}
.btn-primary:disabled{background:rgba(255,255,255,.05);color:#444;box-shadow:none}
.btn-sm{padding:10px 16px;border-radius:10px;font-size:12px;letter-spacing:.5px;transition:all .15s}
.btn-outline{background:transparent;border:1px solid rgba(255,255,255,.1);color:#666;font-size:11px;padding:8px 14px;border-radius:8px}

/* Tags */
.tag{font-size:9px;padding:3px 10px;border-radius:99px;letter-spacing:2px}
.tag-green{background:rgba(34,197,94,.1);color:#22c55e;border:1px solid rgba(34,197,94,.2)}
.tag-blue{background:rgba(59,130,246,.1);color:#3b82f6;border:1px solid rgba(59,130,246,.2)}

/* Analysis sections */
.analysis-section{margin-bottom:12px;padding:12px 14px;background:rgba(255,255,255,.02);border-radius:12px}
.analysis-title{font-size:9px;letter-spacing:2px;font-weight:700;margin-bottom:8px}
.analysis-body{font-size:12px;color:#aaa;line-height:1.9;white-space:pre-wrap}

/* Exercise card */
.ex-card{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);border-radius:14px;margin-bottom:10px;overflow:hidden;transition:border .2s}
.ex-header{padding:14px 16px;cursor:pointer;display:flex;align-items:center;gap:10px}
.ex-body{padding:0 16px 16px;border-top:1px solid rgba(255,255,255,.05)}
.ex-name{font-size:13px;color:#fff;font-family:'Cabinet Grotesk',sans-serif;font-weight:700}
.ex-meta{font-size:10px;color:#555;margin-top:2px}

/* Target box */
.target-box{padding:12px 14px;border-radius:10px;margin:14px 0}
.target-stat{text-align:center}
.target-stat .val{font-size:20px;font-weight:700;font-family:'Cabinet Grotesk',sans-serif;color:#fff}
.target-stat .lbl{font-size:9px;color:#555;margin-top:2px}

/* Set inputs */
.set-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.set-num{width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,.05);display:flex;align-items:center;justify-content:center;font-size:10px;color:#555;flex-shrink:0}

/* History mini chart */
.mini-bar{background:rgba(255,255,255,.04);border-radius:8px;padding:8px 10px;text-align:center;flex-shrink:0}

/* Stat cards */
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.stat-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:12px;text-align:center}
.stat-val{font-size:18px;font-weight:700;font-family:'Cabinet Grotesk',sans-serif}
.stat-lbl{font-size:9px;color:#555;letter-spacing:2px;margin-bottom:4px}

/* Dot indicator */
.dot{width:8px;height:8px;border-radius:50%;position:absolute;top:-3px;right:-3px;border:1.5px solid #080a0e}

/* Info card */
.info-card{background:rgba(59,130,246,.05);border:1px solid rgba(59,130,246,.15);border-radius:14px;padding:14px 16px;margin-bottom:14px}
.info-title{font-size:10px;color:#3b82f6;letter-spacing:2px;margin-bottom:6px}
.info-body{font-size:12px;color:#666;line-height:1.8}

/* Backup */
.backup-card{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:14px 16px;margin-top:16px}
.backup-btn{width:100%;padding:11px;border-radius:10px;font-size:11px;letter-spacing:1px;margin-bottom:8px}
</style>

    </div>

      <div id="nutrition-content"></div>
    </div>

  </div>

// HELPERS
// ═══════════════════════════════════
function parseRepRange(reps) {
  var m = reps.match(/(\d+)[–\-](\d+)/);
  if (m) return {min:parseInt(m[1]), max:parseInt(m[2])};
  var s = reps.match(/(\d+)/);
  if (s) { var n=parseInt(s[1]); return {min:n,max:n}; }
  return {min:8,max:12};
}

function calcRec(history, ex) {
  if (!history || !history.length) return {weight:null, note:'First session — start with a weight you can control for all sets.', pr:false};
  
  // Detect PR — highest weight ever lifted for this exercise
  var allWeights = [];
  history.forEach(function(sess){ (sess.sets||[]).forEach(function(s){ if(s.weight) allWeights.push(s.weight); }); });
  var prWeight = allWeights.length ? Math.max.apply(null, allWeights) : 0;
  var range = parseRepRange(ex.reps);
  var last = history[history.length-1];
  var prev = history.length > 1 ? history[history.length-2] : null;
  var lastSets = last.sets || [];
  if (!lastSets.length) return {weight:null, note:'No sets recorded last time.'};
  var avgR = lastSets.reduce(function(a,s){return a+(s.reps||0);},0)/lastSets.length;
  var lastW = lastSets[0].weight || 0;
  var hitTop = avgR >= range.max;
  var hitTopPrev = prev && (prev.sets||[]).length > 0 && (prev.sets.reduce(function(a,s){return a+s.reps;},0)/prev.sets.length) >= range.max;
  var recW = lastW;
  var note = '';
  var isPR = false;
  if (hitTop && hitTopPrev) { recW = lastW + ex.inc; note = 'Hit top range 2 sessions — increase to ' + recW + 'kg. Next milestone.'; isPR = (recW > prWeight); }
  else if (hitTop) { note = 'Hit top range — hold ' + lastW + 'kg. One more session then increase.'; }
  else if (avgR >= range.min) { note = 'Within range (avg ' + avgR.toFixed(1) + ' reps) — hold ' + lastW + 'kg. Focus on quality.'; }
  else { recW = Math.max(0, lastW - ex.inc); note = 'Below range (avg ' + avgR.toFixed(1) + ') — reduce to ' + recW + 'kg. Rebuild with control.'; }
  return {weight:recW, avgR:avgR.toFixed(1), lastW:lastW, note:note, pr:isPR, prWeight:prWeight};
}

function esc(str) { return (str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  currentScreen = name;
  ['checkin','training','history','analysis','nutrition'].forEach(function(s){
    var sc = document.getElementById('screen-'+s);
    var nb = document.getElementById('nav-'+s);
    if (sc) sc.classList.remove('active');
    if (nb) nb.classList.remove('active');
  });
  var scEl = document.getElementById('screen-'+name);
  var nbEl = document.getElementById('nav-'+name);
  if (scEl) scEl.classList.add('active');
  if (nbEl) nbEl.classList.add('active');

  if (name === 'history') renderHistory();
  if (name === 'analysis') renderAnalysis();
  if (name === 'nutrition') renderNutrition();
  document.getElementById('content').scrollTop = 0;
}

// REST TIMER

function parseRestSeconds(restStr) {
  if (!restStr) return 90;
  var s = restStr.toLowerCase();
  if (s.indexOf('3 min') !== -1) return 180;
  if (s.indexOf('2.5 min') !== -1) return 150;
  if (s.indexOf('2 min') !== -1) return 120;
  if (s.indexOf('90 sec') !== -1) return 90;
  if (s.indexOf('60 sec') !== -1) return 60;
  if (s.indexOf('30 sec') !== -1) return 30;
  var minMatch = s.match(/(\d+\.?\d*)\s*min/);
  if (minMatch) return Math.round(parseFloat(minMatch[1]) * 60);
  var secMatch = s.match(/(\d+)\s*sec/);
  if (secMatch) return parseInt(secMatch[1]);
  return 90;
}

// ═══════════════════════════════════
// AUDIO — dual approach for iOS PWA compatibility
// Method 1: HTML5 Audio element (most reliable on iOS)
// Method 2: Web Audio API fallback
// ═══════════════════════════════════

// Generate a short WAV beep as a data URI (two 880Hz beeps, 200ms each)
var _beepAudio = null;
var _audioUnlocked = false;

function generateBeepWav() {
  var sampleRate = 22050;
  var freq = 880;
  var beepDur = 0.2;
  var gapDur = 0.15;
  var totalDur = beepDur + gapDur + beepDur + 0.05;
  var numSamples = Math.floor(sampleRate * totalDur);
  var buffer = new ArrayBuffer(44 + numSamples * 2);
  var view = new DataView(buffer);

  // WAV header
  function writeStr(offset, str) { for (var i=0;i<str.length;i++) view.setUint8(offset+i,str.charCodeAt(i)); }
  writeStr(0,'RIFF');
  view.setUint32(4, 36+numSamples*2, true);
  writeStr(8,'WAVE');
  writeStr(12,'fmt ');
  view.setUint32(16,16,true);
  view.setUint16(20,1,true);
  view.setUint16(22,1,true);
  view.setUint32(24,sampleRate,true);
  view.setUint32(28,sampleRate*2,true);
  view.setUint16(32,2,true);
  view.setUint16(34,16,true);
  writeStr(36,'data');
  view.setUint32(40,numSamples*2,true);

  // Generate samples: two beeps with a gap
  for (var i=0;i<numSamples;i++){
    var t=i/sampleRate;
    var amp=0;
    if (t<beepDur) {
      amp=0.45*Math.sin(2*Math.PI*freq*t);
      // Fade out last 20ms
      if (t > beepDur-0.02) amp *= (beepDur-t)/0.02;
    } else if (t>=beepDur+gapDur && t<beepDur+gapDur+beepDur) {
      var t2=t-(beepDur+gapDur);
      amp=0.45*Math.sin(2*Math.PI*freq*t2);
      if (t2 > beepDur-0.02) amp *= (beepDur-t2)/0.02;
    }
    view.setInt16(44+i*2, Math.max(-32768,Math.min(32767,Math.round(amp*32767))), true);
  }

  // Convert to base64 data URI
  var bytes = new Uint8Array(buffer);
  var binary = '';
  for (var i=0;i<bytes.length;i++) binary += String.fromCharCode(bytes[i]);
  return 'data:audio/wav;base64,' + btoa(binary);
}

function initBeepAudio() {
  if (_beepAudio) return;
  try {
    _beepAudio = new Audio(generateBeepWav());
    _beepAudio.volume = 1.0;
    _beepAudio.preload = 'auto';
  } catch(e) {}
}

// Unlock audio on first user interaction (iOS requires this)
function unlockAudio() {
  if (_audioUnlocked) return;
  initBeepAudio();
  if (_beepAudio) {
    // Play silently to unlock the audio pipeline
    _beepAudio.volume = 0.01;
    var p = _beepAudio.play();
    if (p && p.then) {
      p.then(function(){
        _beepAudio.pause();
        _beepAudio.currentTime = 0;
        _beepAudio.volume = 1.0;
        _audioUnlocked = true;
      }).catch(function(){});
    }
  }
  // Also try Web Audio unlock
  try {
    var ctx = new (window.AudioContext || window.webkitAudioContext)();
    var buf = ctx.createBuffer(1,1,22050);
    var src = ctx.createBufferSource();
    src.buffer = buf;
    src.connect(ctx.destination);
    src.start(0);
    ctx.resume();
    window._backupAudioCtx = ctx;
  } catch(e){}
}

document.addEventListener('touchstart', unlockAudio, {once:true, passive:true});
document.addEventListener('click', unlockAudio, {once:true, passive:true});

function playBeeps() {
  // Method 1: HTML5 Audio (best iOS compatibility)
  initBeepAudio();
  if (_beepAudio) {
    try {
      _beepAudio.currentTime = 0;
      _beepAudio.volume = 1.0;
      var p = _beepAudio.play();
      if (p && p.then) p.catch(function(){});
    } catch(e){}
  }
  // Method 2: Web Audio API fallback
  try {
    var ctx = window._backupAudioCtx;
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (ctx.state === 'suspended') ctx.resume();
    function beep(startTime, freq, dur) {
      var osc = ctx.createOscillator();
      var gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.4, startTime);
      gain.gain.exponentialRampToValueAtTime(0.001, startTime + dur);
      osc.start(startTime);
      osc.stop(startTime + dur);
    }
    beep(ctx.currentTime, 880, 0.2);
    beep(ctx.currentTime + 0.35, 880, 0.2);
  } catch(e){}
}

function startRestTimer(exId, seconds) {
  // Stop any existing timer
  if (restTimerInterval) { clearInterval(restTimerInterval); restTimerInterval = null; }
  restTimerExId = exId;
  restTimerSeconds = seconds;
  restTimerRunning = true;
  updateTimerBtn(exId, seconds);
  restTimerInterval = setInterval(function() {
    restTimerSeconds--;
    if (restTimerSeconds <= 0) {
      clearInterval(restTimerInterval);
      restTimerInterval = null;
      restTimerRunning = false;
      restTimerExId = null;
      // Vibrate if supported
      if (navigator.vibrate) navigator.vibrate([300, 100, 300]);
      // Two beeps via Web Audio API
      playBeeps();
      updateTimerBtn(exId, 0);
    } else {
      updateTimerBtn(exId, restTimerSeconds);
    }
  }, 1000);
}

function stopRestTimer() {
  if (restTimerInterval) { clearInterval(restTimerInterval); restTimerInterval = null; }
  restTimerRunning = false;
  var exId = restTimerExId;
  restTimerExId = null;
  restTimerSeconds = 0;
  if (exId) updateTimerBtn(exId, -1);
}

function updateTimerBtn(exId, secs) {
  var btn = document.getElementById('timer-btn-' + exId);
  if (!btn) return;
  if (secs === -1) {
    // Reset state
    btn.textContent = '⏱ Start Rest Timer';
    btn.style.background = 'rgba(255,255,255,0.05)';
    btn.style.color = '#aaa';
    btn.style.border = '1px solid rgba(255,255,255,0.1)';
    return;
  }
  if (secs === 0) {
    btn.textContent = '✅ Rest Complete — GO!';
    btn.style.background = 'rgba(34,197,94,0.2)';
    btn.style.color = '#22c55e';
    btn.style.border = '1px solid rgba(34,197,94,0.4)';
    return;
  }
  var mins = Math.floor(secs / 60);
  var s = secs % 60;
  var timeStr = mins > 0 ? mins + ':' + (s < 10 ? '0' : '') + s : s + 's';
  // Color shifts red as time runs low
  var pct = secs / parseRestSeconds(null);
  var color = secs <= 10 ? '#ef4444' : secs <= 30 ? '#f97316' : '#3b82f6';
  btn.textContent = '⏱ ' + timeStr;
  btn.style.background = color + '20';
  btn.style.color = color;
  btn.style.border = '1px solid ' + color + '40';
}

        e.stopPropagation();

          var sd = setInputData[i];
          if (sd && sd.weight !== '' && sd.reps !== '') filledSets.push({weight:sd.weight, reps:sd.reps});
        }
        if (!filledSets.length) return;
        // Check for PR before saving
        var existingHistory = trainingLogs[ex.id] || [];
        var allPrevWeights = [];
        existingHistory.forEach(function(sess){ (sess.sets||[]).forEach(function(s){ if(s.weight) allPrevWeights.push(s.weight); }); });
        var prevPR = allPrevWeights.length ? Math.max.apply(null, allPrevWeights) : 0;
        var newMaxWeight = Math.max.apply(null, filledSets.map(function(s){return s.weight||0;}));
        var isNewPR = newMaxWeight > prevPR;
        if (!trainingLogs[ex.id]) trainingLogs[ex.id] = [];
        trainingLogs[ex.id].push({date:todayStr(), sets:filledSets, pr:isNewPR});
        if (isNewPR) { alert('🏆 NEW PR! ' + newMaxWeight + 'kg on ' + ex.name + ' — new personal record!'); }
        saveTraining();
        loggingExercise = null;
        setInputData = {};
        renderTraining();
        updateHeader();

      var cancelBtn = document.createElement('button');

      cancelBtn.textContent='Cancel';
      cancelBtn.onclick = function(e){ e.stopPropagation(); loggingExercise=null; renderTraining(); };
      btnRow.appendChild(saveBtn); btnRow.appendChild(cancelBtn);
      logForm.appendChild(btnRow);

      var isRunning2 = restTimerRunning && restTimerExId === ex.id;
      timerBtn2.style.cssText = 'width:100%;padding:13px;border-radius:10px;font-family:Cabinet Grotesk,sans-serif;font-size:14px;font-weight:700;margin-top:10px;transition:all .3s;';

        timerBtn2.style.cssText += 'background:rgba(59,130,246,0.2);color:#3b82f6;border:1px solid rgba(59,130,246,0.4)';
      } else {
        timerBtn2.textContent = '⏱ Start Rest — ' + ex.rest;
        timerBtn2.style.cssText += 'background:rgba(255,255,255,0.05);color:#aaa;border:1px solid rgba(255,255,255,0.1)';
      }
      timerBtn2.onclick = (function(eid, rsecs){ return function(e){
        e.stopPropagation();
        if (restTimerRunning && restTimerExId===eid) stopRestTimer();
        else startRestTimer(eid, rsecs);
      }; })(ex.id, parseRestSeconds(ex.rest));
      logForm.appendChild(timerBtn2);

      body.appendChild(logForm);
    }
    card.appendChild(body);
  }
  return card;
}

function renderHistory() {

  c.innerHTML = '';

    c.innerHTML = '<div style="text-align:center;padding:60px 20px;color:#444"><div style="font-size:32px;margin-bottom:12px">📊</div><div style="font-size:12px">No data yet. Log a session or complete a check-in.</div></div>';
    return;
  }

  // Weight trend
  if (checkins.length > 0) {
    var wCard = document.createElement('div');
    wCard.className = 'card';
    wCard.innerHTML = '<div class="section-title">WEIGHT TREND</div>';
    var svg = buildWeightChart();
    wCard.appendChild(svg);
    c.appendChild(wCard);

    // Stats
    var latest = checkins[checkins.length-1];
    var first = checkins[0];
    var chg = (latest.weight-first.weight).toFixed(1);
    var grid = document.createElement('div');

    c.insertBefore(grid, wCard);
  }

  // Training history
  var hasTraining = Object.keys(trainingLogs).some(function(k){ return trainingLogs[k].length>0; });
  if (hasTraining) {
    var tTitle = document.createElement('div');
    tTitle.className = 'section-title';

    tTitle.textContent = 'TRAINING HISTORY';

    PROGRAM.forEach(function(d) {

      loggedEx.forEach(function(ex) {
        var hist = trainingLogs[ex.id]||[];
        var rec = calcRec(hist, ex);
        var exDiv = document.createElement('div');
        exDiv.style.cssText = 'background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:14px 16px;margin-bottom:8px';
        exDiv.innerHTML = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">'
          +'<div><div style="font-family:Cabinet Grotesk,sans-serif;font-size:14px;font-weight:700">'+esc(ex.name)+'</div>'
          +'<div style="font-size:10px;color:#555;margin-top:2px">'+hist.length+' session'+(hist.length>1?'s':'')+' logged</div></div>'
          +(rec.weight?'<div style="text-align:right"><div style="font-size:14px;font-weight:700;color:'+d.color+';font-family:Cabinet Grotesk,sans-serif">'+rec.weight+'kg</div><div style="font-size:9px;color:#555">NEXT TARGET</div></div>':'')
          +'</div>';
        var miniRow = document.createElement('div');

        hist.slice(-6).forEach(function(sess) {
          var rng = parseRepRange(ex.reps);
          var avg = sess.sets.reduce(function(a,s){return a+s.reps;},0)/sess.sets.length;
          var col = avg>=rng.max?'#22c55e':avg>=rng.min?'#eab308':'#ef4444';
          miniRow.innerHTML += '<div class="mini-bar" style="border:1px solid '+col+'30"><div style="font-size:11px;font-weight:700;font-family:Cabinet Grotesk,sans-serif">'+sess.sets[0].weight+'kg</div><div style="font-size:9px;color:'+col+'">'+avg.toFixed(0)+' reps</div><div style="font-size:8px;color:#444;margin-top:2px">'+sess.date.slice(5)+'</div></div>';
        });
        exDiv.appendChild(miniRow);
        dayDiv.appendChild(exDiv);
      });
      c.appendChild(dayDiv);
    });
  }

  // Backup
  var backup = document.createElement('div');
  backup.className = 'backup-card';
  backup.innerHTML = '<div class="section-title">BACKUP & RESTORE</div>'
    +'<div style="font-size:11px;color:#555;margin-bottom:14px;line-height:1.8">Export your data to Notes as a backup. Paste it back here to restore if needed.</div>';

}

function buildWeightChart() {
  var svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('width','100%'); svg.setAttribute('height','160');
  svg.style.overflow='visible';
  if (checkins.length < 1) return svg;
  var W = Math.min(640, window.innerWidth-72);
  var H=140, PL=32, PR=10, PT=10, PB=24;
  var iW=W-PL-PR, iH=H-PT-PB;
  var ws = checkins.map(function(c){return c.weight;});
  var minW=Math.min.apply(null,ws)-0.5, maxW=Math.max.apply(null,ws)+0.5;
  var xS=function(i){return PL+(checkins.length>1?(i/(checkins.length-1))*iW:iW/2);};
  var yS=function(v){return PT+iH-((v-minW)/(maxW-minW))*iH;};
  var pts=checkins.map(function(c,i){return xS(i).toFixed(1)+','+yS(c.weight).toFixed(1);});
  var pathD=pts.map(function(p,i){return(i===0?'M':'L')+p;}).join(' ');
  var areaD=pathD+' L'+xS(checkins.length-1).toFixed(1)+','+(PT+iH)+' L'+PL+','+(PT+iH)+' Z';
  var baseY=yS(checkins[0].weight).toFixed(1);
  svg.innerHTML='<defs><linearGradient id="ag" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#22c55e" stop-opacity="0.15"/><stop offset="100%" stop-color="#22c55e" stop-opacity="0"/></linearGradient></defs>'
    +'<line x1="'+PL+'" y1="'+baseY+'" x2="'+(PL+iW)+'" y2="'+baseY+'" stroke="#222" stroke-dasharray="3,3" stroke-width="1"/>'
    +'<path d="'+areaD+'" fill="url(#ag)"/>'
    +'<path d="'+pathD+'" fill="none" stroke="#22c55e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>';
  checkins.forEach(function(c,i){
    var dot=document.createElementNS('http://www.w3.org/2000/svg','circle');
    dot.setAttribute('cx',xS(i).toFixed(1)); dot.setAttribute('cy',yS(c.weight).toFixed(1));
    dot.setAttribute('r','4'); dot.setAttribute('fill','#22c55e');
    svg.appendChild(dot);
    if (checkins.length<=8||i%Math.ceil(checkins.length/6)===0||i===checkins.length-1){
      var t=document.createElementNS('http://www.w3.org/2000/svg','text');
      t.setAttribute('x',xS(i).toFixed(1)); t.setAttribute('y',H-4);
      t.setAttribute('text-anchor','middle'); t.setAttribute('fill','#444');
      t.setAttribute('font-size','9'); t.setAttribute('font-family','DM Mono,monospace');
      t.textContent=c.week||i+1; svg.appendChild(t);
    }
  });
  return svg;
}

// ANALYSIS SCREEN

function buildAnalysisData() {
  var data = checkins;
  if (!data.length) return null;
  var latest=data[data.length-1], prev=data.length>1?data[data.length-2]:null, prev2=data.length>2?data[data.length-3]:null;
  var wk=prev?+(latest.weight-prev.weight).toFixed(2):null;
  var wk2=prev2?+(latest.weight-prev2.weight).toFixed(2):null;

  var wTxt, newCal=3000, calTxt, macroTxt, flags=[], focusTxt;

  if (wk===null) wTxt='Baseline set at '+latest.weight+'kg. Weigh same time each morning. Analysis begins next week.';
  else if (wk>0.8) wTxt='Gaining too fast (+'+wk+'kg). Target 0.25-0.5kg/month. Reduce calories.';
  else if (wk>0.1) wTxt='On track (+'+wk+'kg). Good lean bulk rate. Stay consistent.';
  else if (wk>=-0.1&&wk2!==null&&Math.abs(wk2)<0.3) wTxt='Stalled 2+ weeks ('+wk2+'kg over 2 weeks). Need more calories to drive growth.';
  else if (wk>=-0.1) wTxt='Stable this week ('+wk+'kg). Watch the 2-3 week trend before adjusting.';
  else wTxt='Losing weight ('+wk+'kg) on a bulk. You are in a deficit. Increase calories.';

  if (wk===null) calTxt='MAINTAIN 3,000 kcal. Baseline week.';
  else if (wk>0.8){newCal=2750;calTxt='DECREASE to 2,750 kcal (−250). Gaining too fast.';}
  else if (wk>0.1) calTxt='MAINTAIN 3,000 kcal. On track.';
  else if (wk>=-0.1&&wk2!==null&&Math.abs(wk2)<0.3){newCal=3200;calTxt='INCREASE to 3,200 kcal (+200). Stalled 2 weeks — add via carbs around training.';}
  else if (wk<-0.1){newCal=3250;calTxt='INCREASE to 3,250 kcal (+250). Losing on a bulk.';}
  else calTxt='MAINTAIN 3,000 kcal. Early data.';

  var p=220,f=85,carbs=Math.round((newCal-p*4-f*9)/4);
  macroTxt=newCal!==3000?newCal+' kcal | '+p+'g protein | '+carbs+'g carbs | '+f+'g fat\nAll adjustments via carbs. Protein and fat stay fixed.':'No change: 3,000 kcal | 220g protein | 340g carbs | 85g fat.';

  if (latest.sleep<6) flags.push('🔴 Sleep critically low ('+latest.sleep+'/10). GH releases during sleep — protect it.');
  else if(latest.sleep<7) flags.push('⚠️ Sleep below optimal ('+latest.sleep+'/10). Aim 7-8hrs.');
  if (latest.energy<5) flags.push('🔴 Energy very low ('+latest.energy+'/10). Check calories, sleep debt, training volume.');
  else if(latest.energy<7) flags.push('⚠️ Energy moderate ('+latest.energy+'/10). Review pre-workout meal timing.');
  if (latest.hunger>8) flags.push('⚠️ High hunger ('+latest.hunger+'/10). Add mid-morning snack.');
  if (latest.training<6) flags.push('⚠️ Training quality low ('+latest.training+'/10). Do not add volume when recovery is down.');
  if (latest.adherence<6) flags.push('⚠️ Adherence low ('+latest.adherence+'/10). Hit protein first.');
  if (!flags.length) flags.push('✅ All markers solid. Keep the consistency.');

  if (latest.adherence<6) focusTxt='Hit 220g protein every single day this week.';
  else if(latest.sleep<6) focusTxt='Hard screen cut-off at 12:15am. Sleep compounds fast.';
  else if(wk===null) focusTxt='Weigh every morning, same conditions. Establish your baseline.';
  else if(newCal>3000) focusTxt='Add '+(newCal-3000)+' kcal through carbs in pre and post workout meals.';
  else if(newCal<3000) focusTxt='Small calorie cut. Watch scale and energy over 2 weeks.';
  else focusTxt='Stay consistent. The lean bulk is working.';

  return [
    {title:'WEIGHT TREND',       color:'#22c55e', body:wTxt},
    {title:'CALORIE ADJUSTMENT', color:'#f97316', body:calTxt},
    {title:'MACRO TARGETS',      color:'#a855f7', body:macroTxt},
    {title:'RECOVERY FLAGS',     color:'#ef4444', body:flags.join('\n')},
    {title:'THIS WEEK FOCUS',    color:'#06b6d4', body:focusTxt},
  ];
}

function renderAnalysis() {
  var c = document.getElementById('analysis-content');
  c.innerHTML = '';
  if (!checkins.length) {
    c.innerHTML='<div style="text-align:center;padding:60px 20px;color:#444"><div style="font-size:32px;margin-bottom:12px">🤖</div><div style="font-size:12px">Complete your first check-in to get analysis.</div></div>';
    return;
  }
  var latest=checkins[checkins.length-1];
  var metaDiv=document.createElement('div');
  metaDiv.style.cssText='display:flex;justify-content:space-between;align-items:center;margin-bottom:16px';
  metaDiv.innerHTML='<div><div style="font-size:10px;color:#22c55e;letter-spacing:2px;margin-bottom:2px">// ANALYSIS</div><div style="font-size:10px;color:#444">Week '+latest.week+' · '+latest.date+'</div></div>';
  c.appendChild(metaDiv);
  var sects=buildAnalysisData();
  if (sects) {
    sects.forEach(function(s) {
      var div=document.createElement('div');
      div.className='analysis-section';
      div.style.border='1px solid '+s.color+'20';
      div.innerHTML='<div class="analysis-title" style="color:'+s.color+'">'+s.title+'</div><div class="analysis-body">'+esc(s.body)+'</div>';
      c.appendChild(div);
    });
  }
  var photoCard=document.createElement('div');
  photoCard.className='info-card';
  photoCard.style.marginTop='12px';
  photoCard.innerHTML='<div class="info-title">📸 PHOTO ANALYSIS</div><div class="info-body">Upload a progress photo in Claude chat with your weekly numbers for body composition coaching.</div>';
  c.appendChild(photoCard);
}

function exportData() {
  var data={checkins:checkins, training:trainingLogs};
  var json=JSON.stringify(data);
  var box=document.getElementById('export-box');
  box.value=json; box.style.display='block'; box.select();
  try{document.execCommand('copy'); alert('Copied! Paste into Notes app to back up.');}
  catch(e){alert('Select all text in the box below and copy it.');}
}
function importData() {
  var txt=document.getElementById('import-box').value.trim();
  if (!txt){alert('Paste your exported data first.');return;}
  try{
    var d=JSON.parse(txt);
    if (d.checkins) checkins=d.checkins;
    if (d.training) trainingLogs=d.training;
    saveCheckins(); saveTraining();
    alert('Restored! '+(checkins.length)+' check-ins and '+(Object.keys(trainingLogs).length)+' exercises loaded.');
    document.getElementById('import-box').value='';
    showScreen(currentScreen);
  }catch(e){alert('Invalid data format.');}
}

function takePhoto(ev) {
  var file = ev.target.files[0];
  if (!file) { return; }
  console.log('[photos] file picked:', file.name, file.type, file.size, 'bytes');
  if (file.size > 25 * 1024 * 1024) { alert('Photo too large (>25MB). Pick a smaller one.'); ev.target.value = ''; return; }
  var reader = new FileReader();
  reader.onerror = function(){ alert('Could not read file.'); };
  reader.onload = function(e) {
    var img = new Image();
    img.onerror = function(){ alert('Could not decode image. iOS sometimes struggles with HEIC — try Edit → Export as JPEG in Photos app first.'); };
    img.onload = function() {
      try {
        var canvas = document.createElement('canvas');
        var maxDim = 1200;
        var w = img.naturalWidth || img.width, h = img.naturalHeight || img.height;
        if (!w || !h) { alert('Image has zero dimensions.'); return; }
        if (w > h && w > maxDim) { h = Math.round(h * maxDim / w); w = maxDim; }
        else if (h > w && h > maxDim) { w = Math.round(w * maxDim / h); h = maxDim; }
        else if (w > maxDim) { h = Math.round(h * maxDim / w); w = maxDim; }
        canvas.width = w; canvas.height = h;
        var ctx = canvas.getContext('2d');
        ctx.fillStyle = '#000'; ctx.fillRect(0, 0, w, h);
        ctx.drawImage(img, 0, 0, w, h);
        var dataUrl = canvas.toDataURL('image/jpeg', 0.85);
        if (!dataUrl || dataUrl.length < 500) { alert('Canvas export produced empty image — may be an iOS HEIC issue.'); return; }
        console.log('[photos] dataUrl length:', dataUrl.length);
        var weight = (typeof checkins !== 'undefined' && checkins.length) ? checkins[checkins.length-1].weight : null;
        photos.push({
          date: (typeof todayStr === 'function' ? todayStr() : new Date().toISOString().split('T')[0]),
          dataUrl: dataUrl,
          weight: weight
        });
        try {
          localStorage.setItem(PHOTO_KEY, JSON.stringify(photos));
          console.log('[photos] saved, total:', photos.length);
        } catch(err) {
          photos.pop();
          alert('Could not save — storage full. Currently using ' + Math.round((JSON.stringify(photos).length + JSON.stringify(localStorage).length) / 1024) + ' KB. Delete some photos first, or older check-ins.');
          return;
        }
        if (typeof renderAnalysis === 'function') renderAnalysis();
      } catch(err) {
        alert('Error processing photo: ' + err.message);
        console.error(err);
      }
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
  ev.target.value = '';
}

async function aiCoach() {
  var out = document.getElementById('aiCoachOut');
  var btn = document.getElementById('aiCoachBtn');
  var key = localStorage.getItem('fk');
  if (!key) {
    key = prompt('Paste your Anthropic API key (sk-ant-...). It will be shared with FinanceAI on this device only.');
    if (!key) return;
    if (!key.indexOf || key.indexOf('sk-ant-') !== 0) { alert('Key must start with sk-ant-'); return; }
    localStorage.setItem('fk', key);
  }
  btn.disabled = true; btn.textContent = 'ANALYSING...';
  out.innerHTML = '<span style="color:#666">Reviewing your last 4 weeks...</span>';

  var recentCheckins = (typeof checkins !== 'undefined' ? checkins : []).slice(-28);
  // trainingLogs is keyed by exercise id. Flatten to a list of sessions for aggregation.
  var allSessions = [];
  if (typeof trainingLogs === 'object' && trainingLogs) {
    Object.keys(trainingLogs).forEach(function(exId){
      (trainingLogs[exId] || []).forEach(function(sess){ allSessions.push(sess); });
    });
  }
  // Last 28 days of sessions
  var cutoff = new Date(); cutoff.setDate(cutoff.getDate() - 28);
  var recentTraining = allSessions.filter(function(s){ return s.date && new Date(s.date) >= cutoff; });
  var avg = function(arr, k) { if (!arr.length) return null; var s = 0, n = 0; arr.forEach(function(x){ if (x[k] != null) { s += x[k]; n++; } }); return n ? +(s/n).toFixed(1) : null; };
  var volume = recentTraining.reduce(function(s,t){ var sets = t.sets || []; return s + sets.reduce(function(a,se){ return a + (se.weight||0) * (se.reps||0); }, 0); }, 0);
  var ctx = {
    checkinsLogged: recentCheckins.length,
    latestWeight: recentCheckins.length ? recentCheckins[recentCheckins.length-1].weight : null,
    firstWeight: recentCheckins.length ? recentCheckins[0].weight : null,
    avgEnergy: avg(recentCheckins, 'energy'),
    avgSleep: avg(recentCheckins, 'sleep'),
    avgMotivation: avg(recentCheckins, 'motivation'),
    trainingSessions: recentTraining.length,
    totalTonnage: Math.round(volume)
  };

  try {
    var resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 700,
        messages: [{
          role: 'user',
          content: 'You are a strength & conditioning coach. Review this trainee\'s last 4 weeks of data. Respond with exactly: (1) 3 short bullets (15 words max each) of what to change, (2) one line recommending either deload or progression with reasoning. No preamble, no pleasantries. Data:\n' + JSON.stringify(ctx, null, 2)
        }]
      })
    });
    var data = await resp.json();
    if (!resp.ok || data.error) throw new Error((data.error && data.error.message) || ('HTTP ' + resp.status));
    var text = (data.content || []).filter(function(c){return c.type==='text';})[0];
    text = text ? text.text : 'Empty response.';
    out.innerHTML = '<div style="white-space:pre-wrap;font-size:12px;color:#bbb;line-height:1.8">' + (typeof esc === 'function' ? esc(text) : text) + '</div>';
  } catch(e) {
    out.innerHTML = '<div style="color:#f87171;font-size:11px">Error: ' + e.message + '</div>';
  }
  btn.disabled = false; btn.textContent = 'REVIEW MY 4 WEEKS';
}

// ---------- 4. 14-DAY CORRELATION SNAPSHOT ----------
function renderCorrelationSection() {
  // trainingLogs is an object keyed by exercise id. Walk each exercise's session list.
  var trainDates = {};
  if (typeof trainingLogs === 'object' && trainingLogs) {
    Object.keys(trainingLogs).forEach(function(exId){
      (trainingLogs[exId] || []).forEach(function(sess){
        if (sess && sess.date) trainDates[sess.date] = true;
      });
    });
  }
  var last14 = [];
  for (var i = 13; i >= 0; i--) {
    var d = new Date(); d.setDate(d.getDate() - i);
    var ds = d.toISOString().split('T')[0];
    var ci = (typeof checkins !== 'undefined' ? checkins : []).find(function(c){ return c.date === ds; });
    last14.push({
      date: ds,
      trained: !!trainDates[ds],
      energy: ci ? ci.energy : null,
      sleep: ci ? ci.sleep : null
    });
  }

  var trained = last14.filter(function(d){return d.trained;});
  var rest = last14.filter(function(d){return !d.trained;});
  var trainedE = trained.filter(function(d){return d.energy;});
  var restE = rest.filter(function(d){return d.energy;});
  var avgT = trainedE.length ? (trainedE.reduce(function(s,d){return s+d.energy;},0)/trainedE.length) : 0;
  var avgR = restE.length ? (restE.reduce(function(s,d){return s+d.energy;},0)/restE.length) : 0;

  var html = '<div class="analysis-section" style="border:1px solid rgba(59,130,246,0.2)">';
  html += '<div class="analysis-title" style="color:#3b82f6">14-DAY SNAPSHOT</div>';
  html += '<div style="display:grid;grid-template-columns:repeat(14,1fr);gap:2px;margin-bottom:10px">';
  last14.forEach(function(d) {
    var col = d.trained ? '#22c55e' : (d.energy ? '#2a2a2a' : '#141414');
    var label = d.trained ? '✓' : '';
    html += '<div title="'+d.date+(d.energy?' · energy '+d.energy:'')+'" style="aspect-ratio:1;background:'+col+';border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:9px;color:#000;font-weight:700">'+label+'</div>';
  });
  html += '</div>';
  html += '<div style="font-size:11px;color:#888;line-height:1.9">'
    + '<div>Training days: <b style="color:#22c55e">'+trained.length+' / 14</b></div>'
    + (avgT ? '<div>Avg energy on training days: <b style="color:#ddd">'+avgT.toFixed(1)+' / 10</b></div>' : '')
    + (avgR ? '<div>Avg energy on rest days: <b style="color:#ddd">'+avgR.toFixed(1)+' / 10</b></div>' : '')
    + '</div>';
  html += '</div>';
  return html;
}

// ---------- 5. POP-OUT REST TIMER OVERLAY ----------
var timerOverlay = null;
var timerOverlayInterval = null;

function showTimerOverlay() {
  if (timerOverlay) return; // already showing
  var ov = document.createElement('div');
  ov.id = 'restTimerOverlay';
  ov.style.cssText = 'position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.96);display:flex;flex-direction:column;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;touch-action:manipulation';

    + '</div>'

  ov.onclick = function(ev) {
    if (ev.target === ov || ev.target.tagName === 'DIV') dismissTimerOverlay();
  };
  document.body.appendChild(ov);
  timerOverlay = ov;

  document.getElementById('timerOvCancel').onclick = function(ev) {
    ev.stopPropagation();
    stopRestTimer();
    dismissTimerOverlay();
  };

  // Update loop
  updateTimerOverlay();
  timerOverlayInterval = setInterval(updateTimerOverlay, 250);
}

function updateTimerOverlay() {
  if (!timerOverlay) return;
  var big = document.getElementById('timerBigNum');
  var exLabel = document.getElementById('timerExName');
  if (!big) return;

  if (!restTimerRunning && restTimerSeconds <= 0 && !restTimerExId) {
    // Timer finished — dramatic GO! flash
    big.textContent = 'GO!';
    big.style.color = '#22c55e';
    big.style.textShadow = '0 0 40px rgba(34,197,94,0.8), 0 0 80px rgba(34,197,94,0.4)';
    if (exLabel) exLabel.textContent = 'GET BACK UNDER THE BAR';
    if (timerOverlay) {
      // Flash the background bright then fade
      timerOverlay.style.background = 'rgba(34,197,94,0.3)';
      setTimeout(function(){ if(timerOverlay) timerOverlay.style.background = 'rgba(0,0,0,0.96)'; }, 200);
      setTimeout(function(){ if(timerOverlay) timerOverlay.style.background = 'rgba(34,197,94,0.3)'; }, 400);
      setTimeout(function(){ if(timerOverlay) timerOverlay.style.background = 'rgba(0,0,0,0.96)'; }, 600);
      setTimeout(function(){ if(timerOverlay) timerOverlay.style.background = 'rgba(34,197,94,0.2)'; }, 800);
      setTimeout(function(){ if(timerOverlay) timerOverlay.style.background = 'rgba(0,0,0,0.96)'; }, 1000);
    }
    // Pulse the GO text
    big.style.animation = 'none';
    var style = document.createElement('style');
    style.id = 'goFlashStyle';
    style.textContent = '@keyframes goPulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.15);opacity:0.7}}';
    if (!document.getElementById('goFlashStyle')) document.head.appendChild(style);
    big.style.animation = 'goPulse 0.6s ease-in-out infinite';
    // Auto-dismiss after 4 seconds
    setTimeout(function(){ dismissTimerOverlay(); }, 4000);
    if (timerOverlayInterval) { clearInterval(timerOverlayInterval); timerOverlayInterval = null; }
    return;
  }

  var secs = restTimerSeconds;
  var mins = Math.floor(secs / 60);
  var s = secs % 60;
  var display = mins > 0 ? mins + ':' + (s < 10 ? '0' : '') + s : s + '';

  big.textContent = display;
  big.style.textShadow = 'none';
  big.style.animation = 'none';
  // Color shifts: blue → orange → red + scale up in last 5s
  if (secs <= 5) {
    big.style.color = '#ef4444';
    big.style.fontSize = 'min(50vw,220px)';
    // Quick tick beep at 3, 2, 1
    if (secs <= 3 && secs >= 1) {
      try {
        var ctx = window._backupAudioCtx;
        if (ctx && ctx.state !== 'closed') {
          if (ctx.state === 'suspended') ctx.resume();
          var osc = ctx.createOscillator();
          var g = ctx.createGain();
          osc.connect(g); g.connect(ctx.destination);
          osc.type = 'sine'; osc.frequency.value = 440;
          g.gain.setValueAtTime(0.2, ctx.currentTime);
          g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.08);
          osc.start(ctx.currentTime); osc.stop(ctx.currentTime+0.08);
        }
      } catch(e){}
    }
  } else if (secs <= 15) {
    big.style.color = '#f97316';
    big.style.fontSize = 'min(40vw,180px)';
  } else {
    big.style.color = '#fff';
    big.style.fontSize = 'min(40vw,180px)';
  }

  // Show exercise name
  if (exLabel && restTimerExId) {
    var exName = '';
    for (var di = 0; di < PROGRAM.length; di++) {
      for (var ei = 0; ei < PROGRAM[di].exercises.length; ei++) {
        if (PROGRAM[di].exercises[ei].id === restTimerExId) {
          exName = PROGRAM[di].exercises[ei].name;
          break;
        }
      }
      if (exName) break;
    }
    exLabel.textContent = exName;
  }
}

function dismissTimerOverlay() {
  if (timerOverlayInterval) { clearInterval(timerOverlayInterval); timerOverlayInterval = null; }
  if (timerOverlay) {
    timerOverlay.parentNode.removeChild(timerOverlay);
    timerOverlay = null;
  }
}

      {name: 'Push-Up (slow)', reps: '10 reps', note: 'Full ROM, warm up pecs + tris'},
      {name: 'Shoulder Pass-Through', reps: '10 reps', note: 'Use band or stick — open chest'},
      {name: 'Wrist Circles', reps: '10 each direction', note: 'Prep wrists for pressing'}
    ]
  },
  'PULL': {
    title: 'PULL DAY WARM-UP',
    time: '5–6 min',
    steps: [
      {name: 'Cat-Cow Stretch', reps: '10 reps', note: 'Mobilise thoracic spine'},
      {name: 'Band Pull-Apart', reps: '15 reps', note: 'Rear delt + rotator cuff activation'},
      {name: 'Dead Hang', reps: '20–30 sec', note: 'Decompress spine, stretch lats'},
      {name: 'Scapular Pull-Up', reps: '8 reps', note: 'Activate scapular retractors'},
      {name: 'Light Lat Pulldown', reps: '15 reps', note: 'High reps, feel the lats engage'},
      {name: 'Wrist / Forearm Stretch', reps: '15 sec each', note: 'Prep grip for rows + curls'}
    ]
  },
  'PUSH/PULL': {
    title: 'SHOULDERS & ARMS WARM-UP',
    time: '5–6 min',
    steps: [
      {name: 'Arm Circles', reps: '15 forward, 15 back', note: 'Full shoulder warm-up'},
      {name: 'Band Pull-Apart', reps: '15 reps', note: 'Rear delt + rotator cuff'},
      {name: 'Light Lateral Raise', reps: '15 reps', note: 'Wake up lateral delts'},
      {name: 'Wrist Circles', reps: '10 each direction', note: 'Prep for curls + pressing'},
      {name: 'Light Bicep Curl', reps: '15 reps', note: 'Blood flow to biceps + forearms'},
      {name: 'Shoulder Pass-Through', reps: '10 reps', note: 'Open chest and shoulders'}
    ]
  }
};

function getWarmupForDay(dayData) {
  var label = dayData.label || '';
  if (label.indexOf('PUSH/PULL') !== -1) return WARMUPS['PUSH/PULL'];
  if (label.indexOf('PUSH') !== -1) return WARMUPS['PUSH'];
  if (label.indexOf('PULL') !== -1) return WARMUPS['PULL'];
  if (label.indexOf('LEG') !== -1) return WARMUPS['LEGS'];
  return WARMUPS['LEGS']; // fallback
}

var warmupOpen = false;

function buildWarmupCard(dayData) {
  var wu = getWarmupForDay(dayData);
  var card = document.createElement('div');
  card.className = 'card';
  card.style.borderColor = 'rgba(251,191,36,0.3)';
  card.style.marginBottom = '14px';

  var hdr = document.createElement('div');
  hdr.style.cssText = 'display:flex;align-items:center;justify-content:space-between;cursor:pointer;padding:2px 0';
  hdr.innerHTML = '<div><div style="font-size:9px;color:#fbbf24;letter-spacing:2px;margin-bottom:3px">' + wu.title + '</div>'
    + '<div style="font-size:11px;color:#555">' + wu.time + ' · ' + wu.steps.length + ' movements</div></div>'
    + '<span style="color:#555;font-size:12px">' + (warmupOpen ? '▲' : '▼') + '</span>';
  hdr.onclick = function() {
    warmupOpen = !warmupOpen;
    renderTraining();
  };
  card.appendChild(hdr);

  if (warmupOpen) {
    var body = document.createElement('div');
    body.style.cssText = 'margin-top:14px;border-top:1px solid rgba(255,255,255,0.05);padding-top:14px';
    wu.steps.forEach(function(step, idx) {
      var row = document.createElement('div');
      row.style.cssText = 'display:flex;align-items:flex-start;gap:10px;margin-bottom:12px';
      row.innerHTML = '<div style="width:22px;height:22px;border-radius:50%;background:rgba(251,191,36,0.12);border:1px solid rgba(251,191,36,0.3);display:flex;align-items:center;justify-content:center;font-size:10px;color:#fbbf24;flex-shrink:0;font-weight:700">' + (idx+1) + '</div>'
        + '<div style="flex:1"><div style="font-size:12px;color:#ddd;font-weight:700;font-family:Cabinet Grotesk,sans-serif">' + step.name + ' <span style="color:#888;font-weight:400;font-size:11px">— ' + step.reps + '</span></div>'
        + '<div style="font-size:10px;color:#555;margin-top:2px">' + step.note + '</div></div>';
      body.appendChild(row);
    });
    card.appendChild(body);
  }
  return card;
}

// Patch renderTraining to inject warm-up card after the day info card
(function() {
  if (typeof renderTraining !== 'function') return;
  var origRT = renderTraining;
  window.renderTraining = function() {
    origRT();
    var container = document.getElementById('training-content');
    if (!container) return;
    var d = PROGRAM[currentDay];
    var warmupCard = buildWarmupCard(d);
    // Insert after the first child (the day info card)
    var firstExCard = container.querySelector('.ex-card');
    if (firstExCard) {
      container.insertBefore(warmupCard, firstExCard);
    } else {
      container.appendChild(warmupCard);
    }
  };
  // Re-render if already on training screen
  var trn = document.getElementById('screen-training');
  if (trn && trn.classList.contains('active')) window.renderTraining();
})();

// ---------- Patch renderAnalysis to include new sections ----------
(function() {
  if (typeof renderAnalysis !== 'function') return;
  var orig = renderAnalysis;
  window.renderAnalysis = function() {
    orig();
    var c = document.getElementById('analysis-content');
    if (!c) return;
    // Remove the old static "PHOTO ANALYSIS" info card if present
    var cards = c.querySelectorAll('.info-card');
    cards.forEach(function(card){ if ((card.textContent||'').indexOf('PHOTO ANALYSIS') !== -1) card.remove(); });
    // Append new sections
    c.insertAdjacentHTML('beforeend', renderCorrelationSection());
    c.insertAdjacentHTML('beforeend', buildAICoachCard());
  };
  // Re-render if user is currently on analysis screen
  var ana = document.getElementById('screen-analysis');
  if (ana && ana.classList.contains('active')) window.renderAnalysis();
})();
</script>
